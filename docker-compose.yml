services:
  telemt-exporter:
    build: .
    restart: unless-stopped
    ports:
      - "9101:9101"
    command:
      - -url=http://telemt:54321   # telemt hostname inside docker network
      - -token=${TELEMT_TOKEN}
      - -listen=:9101

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
